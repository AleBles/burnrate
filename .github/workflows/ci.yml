name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Tests run on vitest under Node (fixtures use node:sqlite, available on
      # Node 22.5+). Bun is still needed: deps install from bun.lock and the
      # cli-* tests spawn the CLI via `bun src/cli.ts`, plus the shipped product
      # runs on Bun.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: npm test

  semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep bracket-assign guard
        run: |
          set -e
          semgrep --config .semgrep/rules/no-bracket-assign-hot-paths.yml \
            --strict --json \
            src/providers/ src/parser.ts > semgrep-out.json
          FINDINGS=$(jq '.results | length' semgrep-out.json)
          if [ "$FINDINGS" -gt 0 ]; then
            jq -r '.results[] | "::error file=\(.path),line=\(.start.line)::\(.extra.message)"' semgrep-out.json
            exit 1
          fi
